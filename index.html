
<!DOCTYPE html>
<html>

<head>
<title>BOOKFLIX</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#141414;
color:white;
font-family:Arial;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 1s;
}

#loader.hide{
opacity:0;
pointer-events:none;
}

.loaderB{
font-size:140px;
color:#e50914;
font-weight:bold;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* NAVBAR */

.navbar{
background:black;
padding:15px;
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.logo{
color:#e50914;
font-size:26px;
font-weight:bold;
cursor:pointer;
}

/* SEARCH */

input{
padding:8px;
border:none;
border-radius:4px;
}

/* FEATURED */

#featured{
min-height:350px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:40px;
}

#featuredInfo{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:6px;
max-width:400px;
}

/* GRID */

#results,#searchResults{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
justify-content:center;
}

/* BOOK CARD */

.book{
width:150px;
position:relative;
cursor:pointer;
transition:transform 0.3s;
}

.book img{
width:100%;
border-radius:6px;
}

.book:hover{
transform:scale(1.15);
z-index:10;
}

/* BADGE */

.badge{
position:absolute;
top:6px;
left:6px;
padding:3px 6px;
font-size:11px;
border-radius:4px;
font-weight:bold;
background:#2ecc71;
color:black;
}

/* HOVER CARD */

.hoverCard{
position:absolute;
left:-10px;
right:-10px;
bottom:-10px;
background:#181818;
padding:12px;
border-radius:6px;
opacity:0;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

.book:hover .hoverCard{
opacity:1;
}

.readBtn{
background:#e50914;
border:none;
color:white;
padding:6px 12px;
margin-top:6px;
cursor:pointer;
border-radius:3px;
}

/* READER */

#reader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:1000;
}

#reader iframe{
flex:1;
border:none;
}

#closeReader{
background:#e50914;
border:none;
color:white;
padding:12px;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
color:#888;
padding:30px;
font-size:12px;
}

/* MOBILE */

@media (max-width:700px){
.book{width:40%;}
}

@media (max-width:450px){
.book{width:80%;}
}

</style>
</head>

<body>

<div id="loader">
<div class="loaderB">B</div>
</div>

<div class="navbar">

<div class="logo" onclick="goHome()">BOOKFLIX</div>

<input id="searchBox" placeholder="Search books">

<button onclick="searchBooks()">Search</button>

</div>

<div id="featured">

<div id="featuredInfo">

<h1 id="featuredTitle"></h1>

<p id="featuredAuthor"></p>

<button onclick="readFeatured()">READ</button>

</div>

</div>

<h2 style="padding-left:20px;">Search Results</h2>
<div id="searchResults"></div>

<h2 style="padding-left:20px;">Library</h2>
<div id="results"></div>

<div id="reader">

<button id="closeReader" onclick="closeReader()">Close</button>

<iframe id="readerFrame"></iframe>

</div>

<footer>
made by liam rodriguez
</footer>

<script>

/* BOOKFLIX LIBRARY (GUTENBERG) */

const books=[

{
title:"Dracula",
author:"Bram Stoker",
cover:"https://covers.openlibrary.org/b/id/8231996-L.jpg",
url:"https://www.gutenberg.org/files/345/345-h/345-h.htm"
},

{
title:"Frankenstein",
author:"Mary Shelley",
cover:"https://covers.openlibrary.org/b/id/8231856-L.jpg",
url:"https://www.gutenberg.org/files/84/84-h/84-h.htm"
},

{
title:"Treasure Island",
author:"Robert Louis Stevenson",
cover:"https://covers.openlibrary.org/b/id/8231980-L.jpg",
url:"https://www.gutenberg.org/files/120/120-h/120-h.htm"
},

{
title:"White Fang",
author:"Jack London",
cover:"https://covers.openlibrary.org/b/id/8226191-L.jpg",
url:"https://www.gutenberg.org/files/910/910-h/910-h.htm"
},

{
title:"Sherlock Holmes",
author:"Arthur Conan Doyle",
cover:"https://covers.openlibrary.org/b/id/8221256-L.jpg",
url:"https://www.gutenberg.org/files/1661/1661-h/1661-h.htm"
},

{
title:"Alice in Wonderland",
author:"Lewis Carroll",
cover:"https://covers.openlibrary.org/b/id/8228691-L.jpg",
url:"https://www.gutenberg.org/files/11/11-h/11-h.htm"
}

]

let featuredBook=books[0];

/* CREATE BOOK */

function createBook(book,parent){

let div=document.createElement("div");

div.className="book";

div.innerHTML=`

<div class="badge">AVAILABLE</div>

<img src="${book.cover}">

<div class="hoverCard">

<b>${book.title}</b><br>

${book.author}<br>

<button class="readBtn">READ</button>

</div>

`;

div.querySelector(".readBtn").onclick=(e)=>{

e.stopPropagation();

openReader(book.url);

};

parent.appendChild(div);

}

/* LOAD LIBRARY */

function loadLibrary(){

let results=document.getElementById("results");

results.innerHTML="";

books.forEach(book=>createBook(book,results));

}

/* FEATURED */

function loadFeatured(){

document.getElementById("featured").style.backgroundImage=
"url("+featuredBook.cover+")";

document.getElementById("featuredTitle").innerText=featuredBook.title;

document.getElementById("featuredAuthor").innerText=featuredBook.author;

}

function readFeatured(){

openReader(featuredBook.url);

}

/* SEARCH */

function searchBooks(){

let query=document.getElementById("searchBox").value.toLowerCase();

let results=document.getElementById("searchResults");

results.innerHTML="";

books
.filter(book=>book.title.toLowerCase().includes(query))
.forEach(book=>createBook(book,results));

document.getElementById("featured").style.display="none";

}

/* READER */

function openReader(url){

document.getElementById("reader").style.display="flex";

document.getElementById("readerFrame").src=url;

}

function closeReader(){

document.getElementById("reader").style.display="none";

document.getElementById("readerFrame").src="";

}

/* HOME */

function goHome(){

document.getElementById("featured").style.display="flex";

document.getElementById("searchResults").innerHTML="";

}

/* ENTER SEARCH */

document.getElementById("searchBox").addEventListener("keypress",function(e){

if(e.key==="Enter"){searchBooks();}

});

/* START */

loadLibrary();

loadFeatured();

/* LOADER */

setTimeout(()=>{

document.getElementById("loader").classList.add("hide");

},1500);

</script>

</body>

</html>
