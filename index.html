
<!DOCTYPE html>
<html>

<head>
<title>BOOKFLIX</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#141414;
color:white;
font-family:Arial;
overflow-x:hidden;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 1s;
}

#loader.hide{
opacity:0;
pointer-events:none;
}

.loaderB{
font-size:140px;
color:#e50914;
font-weight:bold;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* NAVBAR */

.navbar{
background:black;
padding:15px;
display:flex;
gap:15px;
align-items:center;
}

.logo{
color:#e50914;
font-size:26px;
font-weight:bold;
cursor:pointer;
}

input{
padding:8px;
border:none;
border-radius:4px;
}

/* FEATURED */

#featured{
height:420px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:40px;
}

#featuredInfo{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:6px;
max-width:400px;
}

.readBtn{
background:#e50914;
border:none;
color:white;
padding:8px 14px;
cursor:pointer;
margin-top:10px;
}

/* SHELVES */

.shelf{
padding:20px;
}

.row{
display:flex;
overflow-x:auto;
gap:15px;
padding-top:10px;
}

.row::-webkit-scrollbar{
display:none;
}

/* BOOK CARD */

.book{
min-width:150px;
cursor:pointer;
transition:transform .3s;
position:relative;
}

.book img{
width:150px;
border-radius:6px;
}

.book:hover{
transform:scale(1.15);
z-index:5;
}

/* HOVER CARD */

.hoverCard{
position:absolute;
bottom:-10px;
left:-10px;
right:-10px;
background:#181818;
padding:10px;
opacity:0;
transition:.3s;
border-radius:6px;
}

.book:hover .hoverCard{
opacity:1;
}

.badge{
position:absolute;
top:5px;
left:5px;
background:#2ecc71;
color:black;
font-size:11px;
padding:3px 6px;
border-radius:4px;
}

/* READER */

#reader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:1000;
}

#reader iframe{
flex:1;
border:none;
}

#closeReader{
background:#e50914;
border:none;
color:white;
padding:12px;
cursor:pointer;
}

/* SEARCH RESULTS */

#searchResults{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
justify-content:center;
}

/* FOOTER */

footer{
text-align:center;
color:#888;
padding:30px;
font-size:12px;
}

/* MOBILE */

@media (max-width:700px){
.book img{width:120px;}
}

</style>
</head>

<body>

<div id="loader">
<div class="loaderB">B</div>
</div>

<div class="navbar">

<div class="logo" onclick="goHome()">BOOKFLIX</div>

<input id="searchBox" placeholder="Search books">

<button onclick="searchBooks()">Search</button>

</div>

<div id="featured">

<div id="featuredInfo">

<h1 id="featuredTitle"></h1>

<p id="featuredAuthor"></p>

<button class="readBtn" onclick="readFeatured()">READ</button>

</div>

</div>

<div id="searchResults"></div>

<div id="shelves"></div>

<div id="reader">

<button id="closeReader" onclick="closeReader()">Close</button>

<iframe id="readerFrame"></iframe>

</div>

<footer>
made by liam rodriguez
</footer>

<script>

/* BOOK DATABASE */

const shelves={

Trending:[
{title:"Dracula",author:"Bram Stoker",cover:"https://covers.openlibrary.org/b/id/8231996-L.jpg",url:"https://www.gutenberg.org/files/345/345-h/345-h.htm"},
{title:"Frankenstein",author:"Mary Shelley",cover:"https://covers.openlibrary.org/b/id/8231856-L.jpg",url:"https://www.gutenberg.org/files/84/84-h/84-h.htm"}
],

Adventure:[
{title:"Treasure Island",author:"R.L Stevenson",cover:"https://covers.openlibrary.org/b/id/8231980-L.jpg",url:"https://www.gutenberg.org/files/120/120-h/120-h.htm"},
{title:"White Fang",author:"Jack London",cover:"https://covers.openlibrary.org/b/id/8226191-L.jpg",url:"https://www.gutenberg.org/files/910/910-h/910-h.htm"}
],

Mystery:[
{title:"Sherlock Holmes",author:"Arthur Conan Doyle",cover:"https://covers.openlibrary.org/b/id/8221256-L.jpg",url:"https://www.gutenberg.org/files/1661/1661-h/1661-h.htm"}
],

Fantasy:[
{title:"Alice in Wonderland",author:"Lewis Carroll",cover:"https://covers.openlibrary.org/b/id/8228691-L.jpg",url:"https://www.gutenberg.org/files/11/11-h/11-h.htm"}
]

}

/* FEATURED */

let featuredBook=shelves.Trending[0]

function loadFeatured(){

document.getElementById("featured").style.backgroundImage="url("+featuredBook.cover+")"

document.getElementById("featuredTitle").innerText=featuredBook.title

document.getElementById("featuredAuthor").innerText=featuredBook.author

}

function readFeatured(){
openReader(featuredBook.url)
}

/* CREATE BOOK */

function createBook(book){

let div=document.createElement("div")

div.className="book"

div.innerHTML=`

<div class="badge">AVAILABLE</div>

<img src="${book.cover}">

<div class="hoverCard">

<b>${book.title}</b><br>

${book.author}<br>

<button class="readBtn">READ</button>

</div>

`

div.querySelector(".readBtn").onclick=(e)=>{

e.stopPropagation()

openReader(book.url)

}

return div

}

/* LOAD SHELVES */

function loadShelves(){

let container=document.getElementById("shelves")

container.innerHTML=""

for(let category in shelves){

let shelf=document.createElement("div")

shelf.className="shelf"

shelf.innerHTML="<h2>"+category+"</h2>"

let row=document.createElement("div")

row.className="row"

shelves[category].forEach(book=>{

row.appendChild(createBook(book))

})

shelf.appendChild(row)

container.appendChild(shelf)

}

}

/* SEARCH */

function searchBooks(){

let query=document.getElementById("searchBox").value.toLowerCase()

let results=document.getElementById("searchResults")

results.innerHTML=""

for(let category in shelves){

shelves[category].forEach(book=>{

if(book.title.toLowerCase().includes(query)){

results.appendChild(createBook(book))

}

})

}

document.getElementById("featured").style.display="none"

}

/* READER */

function openReader(url){

document.getElementById("reader").style.display="flex"

document.getElementById("readerFrame").src=url

}

function closeReader(){

document.getElementById("reader").style.display="none"

document.getElementById("readerFrame").src=""

}

/* HOME */

function goHome(){

document.getElementById("featured").style.display="flex"

document.getElementById("searchResults").innerHTML=""

}

/* ENTER SEARCH */

document.getElementById("searchBox").addEventListener("keypress",function(e){

if(e.key==="Enter") searchBooks()

})

/* START */

loadFeatured()

loadShelves()

setTimeout(()=>{

document.getElementById("loader").classList.add("hide")

},1500)

</script>

</body>

</html>
