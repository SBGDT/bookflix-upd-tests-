
<!DOCTYPE html>
<html>

<head>
<title>BOOKFLIX</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#141414;
color:white;
font-family:Arial;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 1s;
}

#loader.hide{
opacity:0;
pointer-events:none;
}

.loaderB{
font-size:150px;
color:#e50914;
font-weight:bold;
animation:glow 1.5s infinite alternate;
}

.loaderText{
letter-spacing:6px;
margin-top:10px;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* NAVBAR */

.navbar{
background:black;
padding:15px;
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.logo{
color:#e50914;
font-size:26px;
font-weight:bold;
cursor:pointer;
}

/* SEARCH */

input{
padding:8px;
border:none;
border-radius:4px;
}

/* FEATURED */

#featured{
min-height:350px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:40px;
}

#featuredInfo{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:6px;
max-width:400px;
}

/* GRID */

#results,#searchResults{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
justify-content:center;
}

/* BOOK CARD */

.book{
width:150px;
position:relative;
cursor:pointer;
transition:transform 0.3s;
}

.book img{
width:100%;
border-radius:6px;
}

.book:hover{
transform:scale(1.15);
z-index:10;
}

/* BADGES */

.badge{
position:absolute;
top:6px;
left:6px;
padding:3px 6px;
font-size:11px;
border-radius:4px;
font-weight:bold;
z-index:20;
}

.available{
background:#2ecc71;
color:black;
}

.unavailable{
background:#e50914;
color:white;
}

/* HOVER CARD */

.hoverCard{
position:absolute;
left:-10px;
right:-10px;
bottom:-10px;
background:#181818;
padding:12px;
border-radius:6px;
opacity:0;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

.book:hover .hoverCard{
opacity:1;
}

.readBtn{
background:#e50914;
border:none;
color:white;
padding:6px 12px;
margin-top:6px;
cursor:pointer;
border-radius:3px;
}

/* READER */

#reader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:1000;
}

#reader iframe{
flex:1;
border:none;
}

#closeReader{
background:#e50914;
border:none;
color:white;
padding:12px;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
color:#888;
padding:30px;
font-size:12px;
}

/* MOBILE */

@media (max-width:700px){
.book{width:40%;}
#featured{padding:20px;}
}

@media (max-width:450px){
.book{width:80%;}
.navbar{
flex-direction:column;
align-items:flex-start;
}
}

</style>
</head>

<body>

<div id="loader">
<div class="loaderB">B</div>
<div class="loaderText">BOOKFLIX</div>
</div>

<div class="navbar">

<div class="logo" onclick="goHome()">BOOKFLIX</div>

<input id="searchBox" placeholder="Search books...">

<button onclick="searchBooks()">Search</button>

</div>

<div id="featured">
<div id="featuredInfo">

<h1 id="featuredTitle"></h1>

<p id="featuredAuthor"></p>

<button onclick="readFeatured()">READ</button>

</div>
</div>

<h2 style="padding-left:20px;">Search Results</h2>
<div id="searchResults"></div>

<h2 style="padding-left:20px;">More Like This</h2>
<div id="results"></div>

<div id="reader">

<button id="closeReader" onclick="closeReader()">Close Reader</button>

<iframe id="readerFrame"></iframe>

</div>

<footer>
made by liam rodriguez
</footer>

<script>

let featuredIA="";

/* CREATE BOOK */

function createBook(book,parent){

let cover = book.cover_i
? "https://covers.openlibrary.org/b/id/"+book.cover_i+"-M.jpg"
: "https://via.placeholder.com/150x220?text=Book";

let author = book.author_name ? book.author_name[0] : "Unknown";

let ia = book.ia ? book.ia[0] : null;

let available = ia != null;

let badge = available
? '<div class="badge available">AVAILABLE</div>'
: '<div class="badge unavailable">UNAVAILABLE</div>';

let div=document.createElement("div");
div.className="book";

div.innerHTML=`
${badge}
<img src="${cover}">
<div class="hoverCard">
<b>${book.title}</b><br>
${author}<br>
<button class="readBtn">READ</button>
</div>
`;

div.querySelector(".readBtn").onclick=(e)=>{

e.stopPropagation();

if(ia){
openReader(ia);
}else{
alert("Reader not available for this book.");
}

};

parent.appendChild(div);

}

/* FEATURED */

async function loadFeatured(){

let res=await fetch("https://openlibrary.org/search.json?q=fantasy&has_fulltext=true");

let data=await res.json();

let book=data.docs[0];

if(!book)return;

let cover="https://covers.openlibrary.org/b/id/"+book.cover_i+"-L.jpg";

document.getElementById("featured").style.backgroundImage="url("+cover+")";

document.getElementById("featuredTitle").innerText=book.title;

document.getElementById("featuredAuthor").innerText=
book.author_name ? book.author_name[0] : "Unknown";

featuredIA = book.ia ? book.ia[0] : null;

}

function readFeatured(){

if(featuredIA){
openReader(featuredIA);
}

}

/* SEARCH */

async function searchBooks(){

document.getElementById("featured").style.display="none";

let query=document.getElementById("searchBox").value;

if(query===""){query="books";}

let res=await fetch(
"https://openlibrary.org/search.json?q="+encodeURIComponent(query)+"&has_fulltext=true"
);

let data=await res.json();

let results=document.getElementById("searchResults");

results.innerHTML="";

data.docs.slice(0,20).forEach(book=>{
createBook(book,results);
});

}

/* RECOMMENDATIONS */

async function loadRecommendations(){

let res=await fetch(
"https://openlibrary.org/search.json?q=classic&has_fulltext=true"
);

let data=await res.json();

let results=document.getElementById("results");

results.innerHTML="";

data.docs.slice(0,20).forEach(book=>{
createBook(book,results);
});

}

/* READER */

function openReader(ia){

document.getElementById("reader").style.display="flex";

document.getElementById("readerFrame").src=
"https://archive.org/stream/"+ia+"/page/n1/mode/2up";

}

function closeReader(){

document.getElementById("reader").style.display="none";

document.getElementById("readerFrame").src="";

}

/* HOME */

function goHome(){

document.getElementById("featured").style.display="flex";

document.getElementById("searchResults").innerHTML="";

}

/* ENTER KEY SEARCH */

document.getElementById("searchBox").addEventListener("keypress",function(e){

if(e.key==="Enter"){

searchBooks();

}

});

/* LOAD PAGE */

loadFeatured();

loadRecommendations();

/* LOADER */

setTimeout(()=>{

document.getElementById("loader").classList.add("hide");

},1500);

</script>

</body>

</html>
